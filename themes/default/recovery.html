<div class="auth-page auth-recovery">

    {if $error}
        <div class="auth-error">{$error|escape}</div>
    {/if}

    {if $sent}
        <div class="auth-success">
            Если аккаунт с таким email существует, мы отправили письмо со ссылкой для восстановления пароля.
        </div>
        <div class="auth-links">
            <a href="{$wa_app_url}login/">Вернуться к входу</a>
        </div>
    {elseif $token}
        <h2>Новый пароль</h2>
        <form method="post" class="auth-form">
            {$wa->csrf()}
            <div class="auth-field">
                <label>Новый пароль</label>
                <input type="password" name="password" autocomplete="new-password" autofocus>
            </div>
            <div class="auth-field">
                <label>Повтор пароля</label>
                <input type="password" name="password_confirm" autocomplete="new-password">
            </div>
            <button type="submit" class="auth-submit">Сохранить пароль</button>
        </form>
    {else}
        <h2>Восстановление пароля</h2>
        <form method="post" class="auth-form">
            {$wa->csrf()}
            <div class="auth-field">
                <label>Email</label>
                <input type="email" name="email" autocomplete="email" autofocus>
            </div>
            <button type="submit" class="auth-submit">Восстановить</button>
        </form>
        <div class="auth-links">
            <a href="{$wa_app_url}login/">Вернуться к входу</a>
        </div>
    {/if}

</div>
